name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: yarn check + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system build tools
        # The `.blp` templates are compiled to XML via
        # `@gjsify/esbuild-plugin-blueprint` → `blueprint-compiler`, which
        # in turn needs the `.gir` introspection files for the referenced
        # namespaces (`using Gtk 4.0;`, `using Adw 1;`, `using GtkSource 5;`).
        # `libglib2.0-bin` provides `glib-compile-resources` for
        # `gjsify gresource`.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            blueprint-compiler \
            libglib2.0-bin \
            libgirepository1.0-dev \
            libgtk-4-dev \
            libadwaita-1-dev \
            libgtksourceview-5-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Type-check workspace
        run: yarn check

      - name: Build workspace
        run: yarn build
