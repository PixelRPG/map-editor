name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: gjsify check + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install GNOME dev libs
        # `blueprint-compiler` needs the `.gir` introspection files for the
        # namespaces referenced in `using …;` lines of our `.blp` templates
        # (Gtk 4.0, Adw 1, GtkSource 5). `libglib2.0-bin` ships
        # `glib-compile-resources` for `gjsify gresource`. `meson`/`ninja`
        # are for the blueprint-compiler-from-source build in the next step.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gjs \
            libglib2.0-bin \
            libgirepository1.0-dev \
            libgtk-4-dev \
            libadwaita-1-dev \
            libgtksourceview-5-dev \
            meson \
            ninja-build \
            python3

      - name: Install blueprint-compiler from source
        # Ubuntu 24.04 ships blueprint-compiler 0.10, which predates the
        # `css-classes: [...]` array literal syntax used in our templates.
        # Pin the latest upstream tag (v0.20.4) from GNOME GitLab. Bump
        # this whenever we adopt newer blueprint syntax.
        run: |
          git clone --depth 1 --branch v0.20.4 \
            https://gitlab.gnome.org/jwestman/blueprint-compiler.git /tmp/bpc
          meson setup --prefix=/usr/local /tmp/bpc /tmp/bpc/_build
          sudo meson install -C /tmp/bpc/_build
          blueprint-compiler --version

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install @gjsify/cli globally
        run: npm install -g @gjsify/cli

      - name: Install dependencies (gjsify install --immutable)
        run: gjsify install --immutable

      - name: Type-check workspace
        run: gjsify foreach check -v -t

      - name: Build workspace
        run: gjsify foreach build -v -t

      - name: Verify barrel files are not stale
        run: gjsify foreach check:barrels -v -t

      - name: Run engine tests (collab op-log + awareness contract)
        # The platform-independent @pixelrpg/engine suite — the collab
        # round-trip (op-log sync, awareness, snapshot exchange) + the
        # registry-completeness guard that fails if a new Command isn't
        # registered. Runs under both gjs + node. Keeps "new feature must
        # stay collab-compatible" enforced, not just documented.
        run: gjsify foreach test -v -p --include @pixelrpg/engine
