name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: gjsify check + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install GNOME dev libs
        # `blueprint-compiler` needs the `.gir` introspection files for the
        # namespaces referenced in `using …;` lines of our `.blp` templates
        # (Gtk 4.0, Adw 1, GtkSource 5). `libglib2.0-bin` ships
        # `glib-compile-resources` for `gjsify gresource`. `meson`/`ninja`
        # are for the blueprint-compiler-from-source build in the next step.
        # The `gir1.2-gst*` typelibs satisfy `@gjsify/webrtc`'s
        # `gi://Gst` / `gi://GstSdp` / `gi://GstWebRTC` imports, which the
        # engine test bundle pulls in (collab/PeerSession) — without them
        # the gjs test run aborts at module load with "Typelib for Gst not
        # found". The tests themselves use fakes, so no gst runtime needed.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gjs \
            libglib2.0-bin \
            libgirepository1.0-dev \
            libgtk-4-dev \
            libadwaita-1-dev \
            libgtksourceview-5-dev \
            gir1.2-gstreamer-1.0 \
            gir1.2-gst-plugins-base-1.0 \
            gir1.2-gst-plugins-bad-1.0 \
            gir1.2-soup-3.0 \
            meson \
            ninja-build \
            python3

      - name: Install blueprint-compiler from source
        # Ubuntu 24.04 ships blueprint-compiler 0.10, which predates the
        # `css-classes: [...]` array literal syntax used in our templates.
        # Pin the latest upstream tag (v0.20.4). Bump this whenever we
        # adopt newer blueprint syntax. GNOME GitLab has repeated 5xx
        # outages, so try the official GitHub mirror first and fall back
        # to gitlab.gnome.org, with retries on both.
        run: |
          clone_bpc() {
            for url in \
              https://github.com/GNOME/blueprint-compiler.git \
              https://gitlab.gnome.org/jwestman/blueprint-compiler.git; do
              for attempt in 1 2 3; do
                git clone --depth 1 --branch v0.20.4 "$url" /tmp/bpc && return 0
                echo "clone failed ($url, attempt $attempt), retrying…"
                rm -rf /tmp/bpc
                sleep $((attempt * 10))
              done
            done
            return 1
          }
          clone_bpc
          meson setup --prefix=/usr/local /tmp/bpc /tmp/bpc/_build
          sudo meson install -C /tmp/bpc/_build
          blueprint-compiler --version

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install @gjsify/cli globally (pinned to the lockfile)
        # Bootstrap chicken-and-egg: the global CLI is needed for the
        # initial `gjsify install`, so it can't come from node_modules.
        # Pin it to the exact version gjsify-lock.json resolves for the
        # workspace (apps pin `@gjsify/cli: ^0.4.36`), so the bootstrap
        # CLI and the workspace-local CLI are always the same build and
        # CI never silently adopts a newer release — a broken latest must
        # not break CI without a repo change (global 0.4.40 e.g. could
        # not even build the test bundles). Bumps happen by updating the
        # lockfile in dedicated commits.
        run: |
          version=$(node -p "require('./gjsify-lock.json').packages['node_modules/@gjsify/cli'].version")
          npm install -g "@gjsify/cli@${version}"

      - name: Install dependencies (gjsify install --immutable)
        run: gjsify install --immutable

      - name: Lint + format check (Biome)
        # `biome ci` = linter + formatter in check mode. Direct Biome —
        # the gjsify CLI's own lint/fix subcommands wrap oxlint/oxfmt,
        # which this repo doesn't use. GTK CSS is excluded in biome.json
        # (non-web dialect Biome cannot parse).
        run: ./node_modules/.bin/biome ci packages apps

      - name: Type-check workspace
        run: gjsify foreach check -v -t

      - name: Build workspace
        run: gjsify foreach build -v -t

      - name: Verify barrel files are not stale
        run: gjsify foreach check:barrels -v -t

      - name: Verify every spec is registered in its package test.mts
        # `gjsify test` runs only the suites imported + passed to run() in
        # each package's hand-maintained src/test.mts. A *.spec.ts that
        # isn't registered there silently never runs (CI green, testing
        # nothing) — this trap has bitten the repo twice. Fails if any
        # spec file is missing from its package's test.mts.
        run: node scripts/check-spec-registration.mjs

      - name: Run engine tests (collab op-log + awareness contract)
        # The platform-independent @pixelrpg/engine suite — the collab
        # round-trip (op-log sync, awareness, snapshot exchange) + the
        # registry-completeness guard that fails if a new Command isn't
        # registered. Runs under both gjs + node. Keeps "new feature must
        # stay collab-compatible" enforced, not just documented.
        run: gjsify foreach test -v -p --include @pixelrpg/engine

      - name: Run gjs widget tests (GTK-free helper logic)
        # The @pixelrpg/gjs suite. The widgets themselves subclass
        # Gtk.Widget and can't run headlessly, so this covers the pure,
        # GTK-free helpers extracted alongside them (e.g. MapPreview's
        # fingerprint + viewport-clamp geometry). Runs under both gjs + node.
        run: gjsify foreach test -v -p --include @pixelrpg/gjs

      - name: Run maker tests (collab transport + session services)
        # The @pixelrpg/maker-gjs suite (18 suites): SessionService
        # host/join e2e over REAL LAN signalling (WebSocket on loopback,
        # exercises @gjsify/ws over Soup), collab-session (+e2e),
        # lan-discovery/-signalling, relay signalling, pause policy,
        # engine-state sync, sandbox paths… Headless-safe: no display or
        # WebGL needed; LAN specs bind 127.0.0.1 only, and the real-Avahi
        # discovery integration spec skips itself when no avahi-daemon is
        # available (this runner). Runs under both gjs + node.
        run: gjsify foreach test -v -p --include @pixelrpg/maker-gjs

      - name: Run signalling-server tests (room manager + relay e2e)
        # The @pixelrpg/signalling-server suite: RoomManager unit tests
        # plus the end-to-end relay test, which spawns the GJS bundle
        # built in the build step above (via the pinned global `gjsify`
        # on PATH) and drives it with real `ws` clients from Node.
        run: gjsify foreach test -v -p --include @pixelrpg/signalling-server
